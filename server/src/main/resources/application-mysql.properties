# These used to be in env.xml ; they look like test properties
database.driverClassName=org.mariadb.jdbc.Driver
database.username=root
database.password=changeme
database.maxParameters=-1
database.useSkipLocked=false
# mysql defaults to true
database.caseinsensitive=true
database.default-url=jdbc:mysql://127.0.0.1:3306/uaa?useSSL=true&trustServerCertificate=true

# Spring Session JDBC: flush session attributes immediately so they are visible on the next request.
# With ON_SAVE (default), MySQL can fail to make session attributes (e.g. authorization request with
# code_challenge) visible when the next request loads the session, causing PKCE validation to be
# skipped (stored auth has no code_challenge). PostgreSQL and in-memory session do not exhibit this.
spring.session.jdbc.flush-mode=IMMEDIATE